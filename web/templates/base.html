<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BirdNET Species Metadata{% endblock %}</title>
    <link rel="icon" type="image/png" href="/static/logo.png">
    <style>
        :root {
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #212529;
            --muted: #6c757d;
            --accent: #1a5fb4;
            --accent-light: #3584e4;
            --border: #dee2e6;
            --radius: 8px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        a { color: var(--accent); text-decoration: none; }
        a:hover { color: var(--accent-light); text-decoration: underline; }

        .container { max-width: 1100px; margin: 0 auto; padding: 0 1rem; }

        header {
            background: var(--accent);
            color: white;
            padding: 1rem 0;
            margin-bottom: 1.5rem;
        }
        header .container { display: flex; align-items: center; gap: 1rem; }
        header .logo { height: 32px; width: 32px; border-radius: 50%; }
        header h1 { font-size: 1.4rem; font-weight: 600; }
        header a { color: white; }
        header nav { display: flex; gap: 1rem; font-size: 0.9rem; }
        header nav a { opacity: 0.85; }
        header nav a:hover { opacity: 1; text-decoration: none; }

        .search-bar {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        .search-bar input[type="text"] {
            flex: 1;
            min-width: 200px;
            padding: 0.6rem 1rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 1rem;
        }
        .search-bar select {
            padding: 0.6rem 0.8rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 0.95rem;
            background: white;
        }
        .search-bar button {
            padding: 0.6rem 1.2rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 0.95rem;
            cursor: pointer;
        }
        .search-bar button:hover { background: var(--accent-light); }

        .stats { color: var(--muted); font-size: 0.9rem; margin-bottom: 1rem; }

        .species-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .species-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            transition: box-shadow 0.2s;
        }
        .species-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .species-card a { color: inherit; display: block; }
        .species-card a:hover { text-decoration: none; }
        .species-card img {
            width: 100%;
            aspect-ratio: 3/2;
            object-fit: cover;
            background: #e9ecef;
        }
        .species-card .card-body { padding: 0.8rem 1rem; }
        .species-card .common-name {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text);
        }
        .species-card .sci-name {
            font-style: italic;
            font-size: 0.85rem;
            color: var(--muted);
        }
        .species-card .meta {
            font-size: 0.8rem;
            color: var(--muted);
            margin-top: 0.3rem;
        }

        .badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 500;
            background: #e9ecef;
            color: var(--muted);
        }
        .badge-aves { background: #d4edda; color: #155724; }
        .badge-mammalia { background: #fff3cd; color: #856404; }
        .badge-insecta { background: #f8d7da; color: #721c24; }
        .badge-reptilia { background: #d1ecf1; color: #0c5460; }
        .badge-amphibia { background: #e2d5f1; color: #4a1a7a; }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }
        .pagination a, .pagination span {
            padding: 0.4rem 0.8rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 0.9rem;
        }
        .pagination .active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .no-img {
            width: 100%;
            aspect-ratio: 3/2;
            background: #e9ecef;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            font-size: 0.9rem;
        }

        footer {
            text-align: center;
            padding: 1.5rem 0;
            color: var(--muted);
            font-size: 0.85rem;
            border-top: 1px solid var(--border);
            margin-top: 2rem;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <header>
        <div class="container">
            <a href="/"><img class="logo" src="/static/logo.png" alt="BirdNET"></a>
            <h1><a href="/">BirdNET Species Metadata</a></h1>
            <nav>
                <a href="/">Browse</a>
                <a href="/docs">API Docs</a>
                <a href="/redoc">ReDoc</a>
            </nav>
        </div>
    </header>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <footer>
        <div class="container">
            BirdNET Species Metadata &middot;
            <a href="/docs">REST API</a> &middot;
            <a href="https://github.com/birdnet-team/species-data">GitHub</a>
        </div>
    </footer>
</body>
</html>
