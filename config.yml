# Disabled taxon groups (cached data retained but excluded from builds):
#   Actinopterygii (47178), Chondrichthyes (196614),
#   Malacostraca (47187), Arachnida (47119), Gastropoda (47114),
#   Cephalopoda (47459)

# iNaturalist API settings
inat:
  request_delay: 1.1     # seconds between requests (iNat asks ≤1 req/sec)
  all_names: true        # fetch all common name translations
  save_every: 500        # save progress every N new species

# eBird settings
ebird:
  base_url: "https://ebird.org/species/"
  workers: 4             # parallel fetchers (--workers override)
  rps: 5                 # max requests per second (--rps override)

# Wikipedia settings
wikipedia:
  summary_api: "https://en.wikipedia.org/api/rest_v1/page/summary/"
  langlinks_api: "https://en.wikipedia.org/w/api.php"
  rps: 25                # max requests per second (--rps override)
  # Locales for which to fetch Wikipedia langlinks and extracts.
  # Europe (broad), Americas (en/es/pt), China, Russia, Africa/Middle East.
  locales:
    - en         # English (UK, IE, global)
    - de         # German (DE, AT, CH)
    - fr         # French (FR, BE, CH, West Africa)
    - es         # Spanish (ES, Latin America)
    - pt         # Portuguese (PT, Brazil)
    - it         # Italian (IT, CH)
    - nl         # Dutch (NL, BE)
    - pl         # Polish (PL)
    - sv         # Swedish (SE)
    - da         # Danish (DK)
    - "no"       # Norwegian (NO)
    - fi         # Finnish (FI)
    - cs         # Czech (CZ)
    - zh         # Chinese (CN)
    - ru         # Russian (RU)
    - ar         # Arabic (North Africa, Middle East)
    - ja         # Japanese (JP)
    - ko         # Korean (KR)
    - tr         # Turkish (TR)
    - sw         # Swahili (East Africa)

# Description quality settings
descriptions:
  min_english_words: 40       # release gate for English descriptions
  target_words: 180           # preferred concise description length
  max_words: 500              # long descriptions can be shortened
  wikipedia_extra_sections: 3 # extra early sections to try for short leads
  wikipedia_min_paragraphs: 2 # keep at least two early paragraphs when available

# Public translation service for optional Wikipedia excerpt gap filling.
translation:
  provider: "mymemory"
  service_name: "MyMemory"
  endpoint: "https://api.mymemory.translated.net/get"
  api_key_env: ""
  # email: ""  # Uncomment + set to double free MyMemory quota (5k→10k words/day)
  locales:
    - de
    - es
    - fr
    - cs
    - it
    - pt
  rps: 0.5           # requests/sec; MyMemory free: ~100 req/day so keep low
  workers: 6         # parallel locale threads — each locale runs independently
  save_every: 10     # save progress every N successful translations
  max_chars: 400     # max source chars per excerpt (MyMemory limit ~500)
  batch_size: 3      # excerpts per request; markers add overhead so keep small
  batch_max_chars: 480  # total chars per request incl. markers (stay under 500)
  language_map:
    no: "nb"
    zh_TRA: "zh"

# Offline build-time metadata quality pruning.
# Scores are computed before BirdNET IDs are assigned; dropped species do not
# receive IDs in the generated registry when --reassign-ids is used.
metadata_quality:
  enabled: true
  min_score: 20
  group_min_scores:
    Insecta: 35
  report_path: "dev/metadata_quality_report.csv"
  drop_if_missing_image_and_description: true
  max_external_ids_for_thin_records: 1

# AviList checklist download
avilist:
  url: "https://www.avilist.org/wp-content/uploads/2025/06/AviList-v2025-11Jun-extended.xlsx"
  csv_file: "AviList-v2025-11Jun-extended.csv"   # converted from xlsx

# LLM translation settings (API key is in .env, not here)
# Supports Gemini, OpenAI, and Anthropic — provider auto-detected from .env.
# Priority: GEMINI_API_KEY → OPENAI_API_KEY → ANTHROPIC_API_KEY
# Override with `provider: "gemini"` (or openai / anthropic).
#
# Default models per provider (override with `model:`):
#   gemini:    gemini-3.1-flash-lite
#   openai:    gpt-4o-mini
#   anthropic: claude-haiku-4-5-20251001
llm:
  provider: "auto"        # auto-detect from .env; or "gemini"/"openai"/"anthropic"
  model: ""               # leave empty to use provider default
  locales:
    - de         # German
    - fr         # French
    - it         # Italian
    - es         # Spanish
    - cs         # Czech
    - pt         # Portuguese
  batch_size: 12          # max species per API call (char budget may reduce this)
  translate_workers: 4    # parallel translation workers
  save_every: 10          # save raw_data/translate_data.json every N completed batches
  source_char_budget: 12000  # approx source chars per API call
  max_source_chars: 3000     # per-species source truncation for translation
  max_tokens: 16384       # max output tokens per API call
  max_extract_words: 500  # shorten extracts longer than this
  target_words: 150       # target length for shortened extracts
  request_delay: 1.0      # seconds between requests; paid tier has high RPM limits

# Image settings (served via /api/image endpoint)
images:
  workers: 4             # parallel download threads (--workers override)
  thumb_width: 150       # thumbnail max width (3:2 aspect ratio)
  thumb_height: 100      # thumbnail max height
  thumb_quality: 40      # thumbnail WebP quality (1-100)
  medium_width: 480      # medium max width (3:2 aspect ratio)
  medium_height: 320     # medium max height
  medium_quality: 60     # medium WebP quality (1-100)

# Wikidata / Wikimedia Commons settings
wikidata:
  sparql_batch: 150      # species per SPARQL query batch
  commons_batch: 50      # files per Wikimedia Commons license check

# Macaulay Library settings
macaulay:
  rps: 10                # max requests per second
  api_key: "PUB5447877383"  # public ML taxonomy API key

# Xeno-Canto settings (API key is in .env: XC_API_KEY=...)
xenocanto:
  rps: 5                 # max requests per second

# observation.org settings
observationorg:
  rps: 10                # max requests per second
  workers: 8             # parallel workers (--workers override)
  save_every: 200        # save every N completed species
