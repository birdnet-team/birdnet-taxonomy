# Species Data Pipeline Configuration
# ====================================
# Central configuration for all scripts. Edit this file to change
# locales, taxon groups, API settings, etc.

# iNaturalist iconic taxon groups to fetch.
# Each entry has a name and the iNat taxon_id used for filtering.
# min_observations: only fetch species with at least this many observations.
#   0 = fetch all species (no filter). Adjust thresholds to control dataset size.
taxon_groups:
  - name: Aves
    taxon_id: 3
    min_observations: 0     # all birds (0 = no filter)
  - name: Mammalia
    taxon_id: 40151
    min_observations: 50
  - name: Insecta
    taxon_id: 47158
    min_observations: 50
  - name: Reptilia
    taxon_id: 26036
    min_observations: 50
  - name: Amphibia
    taxon_id: 20978
    min_observations: 50

# iNaturalist API settings
inat:
  base_url: "https://api.inaturalist.org/v1/taxa"
  per_page: 200          # iNat API caps at 200
  request_delay: 1.1     # seconds between requests (iNat asks ≤1 req/sec)
  all_names: true        # fetch all common name translations

# eBird settings
ebird:
  base_url: "https://ebird.org/species/"
  workers: 4             # parallel fetchers (--workers override)
  rps: 5                 # max requests per second (--rps override)

# Wikipedia settings
wikipedia:
  summary_api: "https://en.wikipedia.org/api/rest_v1/page/summary/"
  langlinks_api: "https://en.wikipedia.org/w/api.php"
  workers: 4             # parallel species fetchers (--workers override)
  rps: 50                # max requests per second (--rps override)
  # Locales for which to fetch Wikipedia langlinks and extracts.
  # Europe (broad), Americas (en/es/pt), China, Russia, Africa/Middle East.
  locales:
    - en         # English (UK, IE, global)
    - de         # German (DE, AT, CH)
    - fr         # French (FR, BE, CH, West Africa)
    - es         # Spanish (ES, Latin America)
    - pt         # Portuguese (PT, Brazil)
    - it         # Italian (IT, CH)
    - nl         # Dutch (NL, BE)
    - pl         # Polish (PL)
    - sv         # Swedish (SE)
    - da         # Danish (DK)
    - "no"       # Norwegian (NO)
    - fi         # Finnish (FI)
    - cs         # Czech (CZ)
    - zh         # Chinese (CN)
    - ru         # Russian (RU)
    - ar         # Arabic (North Africa, Middle East)
    - ja         # Japanese (JP)
    - ko         # Korean (KR)
    - tr         # Turkish (TR)
    - sw         # Swahili (East Africa)

# AviList checklist download
avilist:
  url: "https://www.avilist.org/wp-content/uploads/2025/06/AviList-v2025-11Jun-extended.xlsx"
  csv_file: "AviList-v2025-11Jun-extended.csv"   # converted from xlsx

# Claude API settings (API key is in .env, not here)
# Locales listed here are the target languages for Claude-generated
# translations. Core European + Chinese, Russian, Arabic.
claude:
  model: "claude-sonnet-4-20250514"
  locales:
    - en         # English
    - de         # German
    - fr         # French
    - es         # Spanish
    - pt         # Portuguese
    - it         # Italian
    - nl         # Dutch
    - zh         # Chinese
    - ru         # Russian
    - ar         # Arabic
  batch_size: 5           # species per API call (describe + translate)
  max_source_chars: 500   # truncate source text per species to save tokens
  description_max_tokens: 2048   # for batched description generation
  translation_max_tokens: 8192   # for batched multi-species translation
  request_delay: 0.5

# Image proxy settings (served via /api/image endpoint)
images:
  thumb_width: 150       # thumbnail max width
  thumb_height: 100      # thumbnail max height (3:2 at 150)
  medium_width: 480      # medium max width
  medium_height: 320     # medium max height (3:2 at 480)
  large_width: 1200      # large max width
  large_height: 800      # large max height (3:2 at 1200)
  quality: 80            # WebP quality (1-100)
  cache_dir: ".image_cache"  # local disk cache for converted images
